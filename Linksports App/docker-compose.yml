version: "3.9"

# ─── Docker Compose for LinkSports Migration ─────────────────────────────────
# Spins up:
#   1. mysql8   – temporary MySQL instance to load the legacy dump
#   2. mongo    – MongoDB 7 (mirrors your Atlas setup for local dev)
#   3. mongo-express – optional web UI for MongoDB
#
# Usage:
#   docker compose up -d          # start all services
#   docker compose logs -f        # tail logs
#   docker compose down -v        # stop + remove volumes
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Legacy MySQL (source for migration) ─────────────────────────────────────
  mysql8:
    image: mysql:8.0
    container_name: linksports_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: linksports
      MYSQL_USER: linksports
      MYSQL_PASSWORD: linksports123
    ports:
      - "3306:3306"
    volumes:
      # Automatically import a SQL dump placed at ./dump/linksports_dump.sql
      - ./dump:/docker-entrypoint-initdb.d:ro
      - mysql_data:/var/lib/mysql
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --sql_mode=NO_AUTO_VALUE_ON_ZERO
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-psecret"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── MongoDB (destination / local dev mirror) ─────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: linksports_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: linksports
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./mongo-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 })"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Mongo Express (optional web UI) ─────────────────────────────────────────
  mongo-express:
    image: mongo-express:latest
    container_name: linksports_mongo_express
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: admin123
      ME_CONFIG_MONGODB_URL: mongodb://admin:admin123@mongo:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123

volumes:
  mysql_data:
  mongo_data:

# ─────────────────────────────────────────────────────────────────────────────
# After all containers are healthy, run the migration:
#
#   # From the backend directory:
#   MYSQL_HOST=127.0.0.1 MYSQL_USER=root MYSQL_PASSWORD=secret \
#   MYSQL_DATABASE=linksports \
#   MONGODB_URI=mongodb://admin:admin123@127.0.0.1:27017/linksports?authSource=admin \
#   node scripts/migrate_mysql_to_mongo.js
#
# Or set these values in your .env:
#   MYSQL_HOST=127.0.0.1
#   MYSQL_PORT=3306
#   MYSQL_USER=root
#   MYSQL_PASSWORD=secret
#   MYSQL_DATABASE=linksports
#   MONGODB_URI=mongodb://admin:admin123@127.0.0.1:27017/linksports?authSource=admin
# ─────────────────────────────────────────────────────────────────────────────
